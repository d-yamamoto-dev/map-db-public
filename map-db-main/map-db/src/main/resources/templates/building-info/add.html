<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>
    <div class="container">
        <h1>建物情報登録</h1>
        <form th:action="@{/map-db/building-info/create}" th:object="${buildingInfoDto}" th:method="post">

            <div class="form-group">
                <input type="hidden" th:value="${buildingId}" name="buildingId" class="form-control">
            </div>

            <div class="form-gropu">
                <label>名前</label>
                <input type="text" th:field="*{name}" class="form-control">
            </div>

            <div class="form-gropu">
                <label>住所</label>
                <input type="text" th:field="*{address}" class="form-control">
            </div>

            <div class="form-group">
                <input type="hidden" th:value="${lat}" name="latitude" class="form-control">
            </div>

            <div class="form-group">
                <input type="hidden" th:value="${lng}" name="longtitude" class="form-control">
            </div>
            <br />
            <div class="text-center">
                <input type="submit" value=" 登録 " class="btn btn-primary">
            </div>
        </form>
    </div>
</body>

</html>
