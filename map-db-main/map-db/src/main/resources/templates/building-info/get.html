<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>
    <div class="container">
        <h1>建物詳細情報</h1>
        <div th:object="${buildingInfo}">
            <div class="row mx-md-n5">
                <div class="col-2 pt-3 border bg-light">建物ID</div>
                <div class="col pt-3 border">
                    <p th:text="*{buildingId}"></p>
                </div>
            </div>
            <div class="row mx-md-n5">
                <div class="col-2 pt-3 border bg-light">名前</div>
                <div class="col pt-3 border">
                    <p th:text="*{name}"></p>
                </div>
            </div>
            <div class="row mx-md-n5">
                <div class="col-2 pt-3 border bg-light">住所</div>
                <div class="col pt-3 border">
                    <p th:text="*{address}"></p>
                </div>
            </div>
        </div>
        <br />
        <div class="text-center">
            <a href="/map-db/building-info/list" class="btn btn-secondary">一覧に戻る</a>
        </div>
    </div>
</body>

</html>
